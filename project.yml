name: Auralis
options:
  bundleIdPrefix: com.michaeltrannhan
  deploymentTarget:
    macOS: "14.2"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "2"
    CODE_SIGN_STYLE: Automatic
    REGISTER_APP_GROUPS: YES
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: 6T8J96Z3SD
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Debug:
      AURALIS_DEBUG_LOG_PATH: "$(SRCROOT)/.build/logs/runtime/Auralis-debug.log"
      AURALIS_DIAGNOSTICS_MODE: "detailed"
    Release:
      AURALIS_DEBUG_LOG_PATH: ""
      AURALIS_DIAGNOSTICS_MODE: "minimal"
configs:
  Debug: debug
  Release: release
targets:
  Auralis:
    type: application
    platform: macOS
    deploymentTarget: "14.2"
    sources:
      - Sources/Auralis
      - path: Resources/Brand/Auralis.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Auralis
        PRODUCT_MODULE_NAME: Auralis
        EXECUTABLE_NAME: Auralis
        PRODUCT_BUNDLE_IDENTIFIER: com.michaeltrannhan.Auralis
        INFOPLIST_FILE: Resources/Auralis-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Auralis.entitlements
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: AuralisWidgetShared
      - target: AuralisWidget
        embed: true
        codeSign: true
  AuralisWidgetShared:
    type: library.static
    platform: macOS
    deploymentTarget: "14.2"
    sources:
      - Sources/AuralisWidgetShared
    settings:
      base:
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
  AuralisWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.2"
    sources:
      - Sources/AuralisWidget
      - path: Sources/Auralis/Widget/WidgetSnapshot.swift
      - path: Sources/Auralis/Widget/WidgetCommandQueue.swift
      # Interactive WidgetKit AppIntents must be compiled into both the host
      # app and widget extension so macOS can resolve their archived types.
      - path: Sources/Auralis/Widget/WidgetAppIntents.swift
      - path: Sources/Auralis/Widget/WidgetDiagnostics.swift
      - path: Resources/Brand/Auralis.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaeltrannhan.Auralis.Widget
        INFOPLIST_FILE: Resources/AuralisWidget-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/AuralisWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../../../Frameworks"
    dependencies:
      - target: AuralisWidgetShared
  AuralisTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.2"
    sources:
      - Tests/AuralisTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaeltrannhan.AuralisTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Auralis.app/Contents/MacOS/Auralis"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Auralis
      - target: AuralisWidgetShared
  AuralisWidgetTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.2"
    sources:
      - Tests/AuralisWidgetTests
      - path: Sources/AuralisWidget/AuralisWidget.swift
      - path: Sources/Auralis/Widget/WidgetAppIntents.swift
      - path: Sources/AuralisWidget/WidgetMixerView.swift
      - path: Sources/AuralisWidget/WidgetEQView.swift
      - path: Sources/AuralisWidget/WidgetBrandMark.swift
      - path: Sources/Auralis/Widget/WidgetDiagnostics.swift
      - path: Resources/Brand/Auralis.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaeltrannhan.AuralisWidgetTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Auralis.app/Contents/MacOS/Auralis"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Auralis
      - target: AuralisWidgetShared
schemes:
  Auralis:
    build:
      targets:
        Auralis: all
        AuralisTests: [test]
        AuralisWidgetTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: AuralisTests
        - name: AuralisWidgetTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
